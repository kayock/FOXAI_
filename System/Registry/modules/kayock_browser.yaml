module_id: kayock_browser
display_name: Kayock Browser
status: detect
owner_department: Interface
entry_path: Interface/Kayock_Browser
autostart: false
safe_mode: true
launch_type: executable_scan
executable_pattern: "*.exe"
description: Main browser-based interface for KayocktheOS. The Bridge detects portable browser executables in Interface/Kayock_Browser and can launch them.
notes: Put the portable Kayock Browser EXE in Interface/Kayock_Browser. The Core Launcher will discover it automatically.
